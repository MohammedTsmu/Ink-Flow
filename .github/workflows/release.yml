name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only; do not attach to a release'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build & package
        env:
          USE_HARD_LINKS: 'false'
          # electron-builder reads GH_TOKEN if it wants to publish; we
          # don't publish via builder, so this is a no-op but harmless.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package

      - name: Upload build artifacts (CI inspection)
        uses: actions/upload-artifact@v4
        with:
          name: ink-flow-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.snap
            release/*.rpm
            release/latest*.yml
          if-no-files-found: warn
          retention-days: 14

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.dry_run != 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
