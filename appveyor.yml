# AppVeyor cross-platform release pipeline.
#
# Used while GitHub Actions is unavailable (account billing locked).
# Free for public repos with no additional billing on AppVeyor's side.
# Builds Win + macOS + Linux sequentially using AppVeyor's three image
# variants.
#
# Auto-deploy to GitHub Releases requires ONE one-time setup step:
#   1. Sign in at https://ci.appveyor.com (already done).
#   2. Project → Ink-Flow → Settings → Environment → Add variable
#      Name:  GH_RELEASE_TOKEN
#      Value: <your GitHub PAT — paste the raw token from github.com/settings/tokens>
#      Click the lock icon next to the value to encrypt it at rest.
#   3. Save. Done — every tag push will auto-attach installers.
#
# Tag pushes (v*.*.*) trigger automatic GitHub release attach.
# Non-tag pushes build artifacts that can be downloaded from
# AppVeyor's Artifacts tab on each job.

version: 3.0.{build}

# One job per OS; AppVeyor runs them in sequence on the free tier.
image:
  - Visual Studio 2022          # Windows
  - macos-sonoma                # macOS
  - Ubuntu2204                  # Linux

# Don't waste CI time on docs-only changes.
skip_commits:
  files:
    - '.gitignore'
    - 'LICENSE'

# Skip the redundant build that fires for both PR-source-branch and PR.
skip_branch_with_pr: true

stack: node 20

# Cache npm + electron downloads so re-runs are fast.
cache:
  - node_modules -> package-lock.json
  - '%LOCALAPPDATA%\electron\Cache -> package-lock.json'
  - '%LOCALAPPDATA%\electron-builder\Cache -> package-lock.json'
  - $HOME/.cache/electron -> package-lock.json
  - $HOME/.cache/electron-builder -> package-lock.json

install:
  - npm ci

build_script:
  - npm test
  - npm run package

# Pick up every flavor electron-builder emits per host OS.
artifacts:
  - path: release/*.exe
    name: windows-installer
  - path: release/*.dmg
    name: macos-dmg
  - path: release/*.zip
    name: macos-zip
  - path: release/*.AppImage
    name: linux-appimage
  - path: release/*.deb
    name: linux-deb
  - path: release/latest*.yml
    name: update-manifest

# Auto-attach to the GitHub Release matching the tag.
# Reads GH_RELEASE_TOKEN from environment variables — set this once in
# the AppVeyor project Settings (see header comment).
#
# The artifact regex includes latest*.yml so electron-updater can find
# its version manifests on the release page — without those the auto-
# updater 404s at runtime trying to fetch v<tag>/latest.yml.
deploy:
  - provider: GitHub
    release: $(APPVEYOR_REPO_TAG_NAME)
    description: 'Built by AppVeyor from commit $(APPVEYOR_REPO_COMMIT).'
    auth_token: $(GH_RELEASE_TOKEN)
    artifact: /.*\.(exe|dmg|zip|AppImage|deb|blockmap|yml)/
    draft: false
    prerelease: false
    force_update: true
    on:
      APPVEYOR_REPO_TAG: true
